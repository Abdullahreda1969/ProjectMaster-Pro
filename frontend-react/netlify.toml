[build]
  base = "frontend-react"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# إعادة توجيه جميع طلبات /api إلى Fly.io
[[redirects]]
  from = "/api/*"
  to = "https://projectmaster-pro-fldq5w.fly.dev/api/:splat"
  status = 200
  force = true

# توجيه جميع الطلبات الأخرى إلى index.html (لـ React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# إضافة رؤوس للتخزين المؤقت
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"