<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectMaster Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 90%;
        }
        
        .logo {
            font-size: 60px;
            margin-bottom: 20px;
            color: #fff;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .tagline {
            font-size: 20px;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .feature {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 10px;
            transition: transform 0.3s;
        }
        
        .feature:hover {
            transform: translateY(-5px);
        }
        
        .feature i {
            font-size: 30px;
            margin-bottom: 10px;
        }
        
        .status {
            margin: 30px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s;
            margin: 10px;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 10px;
            min-width: 150px;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            display: block;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-project-diagram"></i>
        </div>
        
        <h1>ProjectMaster Pro</h1>
        <p class="tagline">نظام إدارة المشاريع الاحترافي المتكامل</p>
        
        <div class="status" id="api-status">
            <i class="fas fa-spinner fa-spin"></i>
            جاري التحقق من حالة النظام...
        </div>
        
        <div class="features">
            <div class="feature">
                <i class="fas fa-tasks"></i>
                <h3>إدارة المهام</h3>
                <p>تنظيم ومتابعة المهام بسهولة</p>
            </div>
            <div class="feature">
                <i class="fas fa-users"></i>
                <h3>إدارة الفريق</h3>
                <p>توزيع المهام ومتابعة الأداء</p>
            </div>
            <div class="feature">
                <i class="fas fa-chart-line"></i>
                <h3>التقارير</h3>
                <p>تحليلات وإحصائيات مفصلة</p>
            </div>
            <div class="feature">
                <i class="fas fa-dollar-sign"></i>
                <h3>المالية</h3>
                <p>إدارة الميزانية والفواتير</p>
            </div>
        </div>
        
        <a href="/dashboard" class="btn">
            <i class="fas fa-rocket"></i> ابدأ الآن
        </a>
        
        <a href="/docs" class="btn" style="background: transparent; border: 2px solid white;">
            <i class="fas fa-book"></i> التوثيق
        </a>
        
        <div class="stats">
            <div class="stat">
                <span class="stat-number" id="projects-count">0</span>
                <span class="stat-label">مشروع</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="tasks-count">0</span>
                <span class="stat-label">مهمة</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="users-count">0</span>
                <span class="stat-label">مستخدم</span>
            </div>
        </div>
    </div>
    
    <script>
        // التحقق من حالة API
        async function checkApiStatus() {
            try {
                const response = await fetch('/health');
                if (response.ok) {
                    document.getElementById('api-status').innerHTML = 
                        '<i class="fas fa-check-circle"></i> النظام يعمل بشكل طبيعي';
                    document.getElementById('api-status').style.background = 'rgba(46, 204, 113, 0.2)';
                }
            } catch (error) {
                document.getElementById('api-status').innerHTML = 
                    '<i class="fas fa-exclamation-triangle"></i> الخادم غير متوفر';
                document.getElementById('api-status').style.background = 'rgba(231, 76, 60, 0.2)';
            }
        }
        
        // تحديث الإحصائيات
        function updateStats() {
            document.getElementById('projects-count').textContent = '12';
            document.getElementById('tasks-count').textContent = '156';
            document.getElementById('users-count').textContent = '8';
        }
        
        // التهيئة
        document.addEventListener('DOMContentLoaded', () => {
            checkApiStatus();
            updateStats();
            
            // تحديث تلقائي كل 30 ثانية
            setInterval(checkApiStatus, 30000);
        });
    </script>
</body>
</html>
